name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install Dependencies
      run: bun install

    # Eğer projenizde Biome kurulu değilse bu adım başarısız olur.
    # Bu adımın çalışabilmesi için bir sonraki işlemde Biome'u kuracağız.
    - name: Run Linters & Formatting Check
      run: bun run lint

    # Metamod'u C++ tarafında derlemek için GCC ve CMake gerekiyor
    # ubuntu-latest imajında gcc, g++ ve cmake yüklü geliyor.
    - name: Build C++ and TS
      run: bun run build

    - name: Run Tests
      run: bun test
